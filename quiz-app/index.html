<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>本地刷题软件</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="panel sidebar">
        <div class="brand">
          <p class="eyebrow">Local Quiz Studio</p>
          <h1>本地刷题软件</h1>
          <p class="muted">按题型顺刷，不重复；做错自动进入错题库，做对自动移出。</p>
        </div>

        <section class="control-group">
          <h2>题目范围</h2>
          <div class="segment" id="mode-segment">
            <button data-mode="normal" class="active">普通刷题</button>
            <button data-mode="wrong">错题库</button>
          </div>
        </section>

        <section class="control-group">
          <h2>题型选择</h2>
          <div class="type-grid" id="type-selector">
            <button data-type="judge" class="active">判断题</button>
            <button data-type="single">单选题</button>
            <button data-type="multiple">多选题</button>
          </div>
        </section>

        <section class="control-group">
          <h2>刷题顺序</h2>
          <div class="segment" id="order-segment">
            <button data-order="sequential" class="active">按顺序</button>
            <button data-order="random">随机乱序</button>
          </div>
        </section>

        <section class="stats-card">
          <h2>当前统计</h2>
          <div class="stats-list">
            <div><span>当前池子</span><strong id="pool-count">0</strong></div>
            <div><span>剩余未刷</span><strong id="remaining-count">0</strong></div>
            <div><span>错题数量</span><strong id="wrong-count">0</strong></div>
            <div><span>本轮正确率</span><strong id="accuracy-count">0%</strong></div>
          </div>
        </section>

        <section class="control-group">
          <h2>操作</h2>
          <div class="action-list">
            <button id="next-question-btn" class="ghost">下一题</button>
            <button id="reset-progress-btn" class="ghost danger">重置当前题型进度</button>
            <button id="clear-wrong-btn" class="ghost danger">清空错题库</button>
            <button id="clear-all-btn" class="ghost danger">清空所有数据</button>
          </div>
        </section>
      </aside>

      <main class="panel content">
        <section class="hero">
          <p class="eyebrow">Theory Practice</p>
          <h2 id="session-title">加载中...</h2>
          <p class="muted" id="session-subtitle">正在读取题库。</p>
        </section>

        <section class="question-card" id="question-card">
          <div class="question-meta">
            <span id="question-badge">题型</span>
            <span id="question-progress">第 0 题</span>
          </div>
          <h3 id="question-text">请稍候...</h3>
          <div id="options-container" class="options"></div>
          <div class="question-actions">
            <button id="submit-btn" class="primary">提交答案</button>
            <button id="show-answer-btn" class="ghost">查看答案</button>
          </div>
          <div id="feedback" class="feedback hidden"></div>
        </section>
      </main>
    </div>

    <script src="./questions.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
